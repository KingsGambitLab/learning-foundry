id: oos_weather
description: "S3 / out_of_scope: What's the weather forecast in Paris this weekend?"
category: out_of_scope
quality_bar_ids:
- out_of_scope_refusal
trace:
- id: call_oos_weather
  method: POST
  path: /support/answer
  body:
    message: "What's the weather forecast in Paris this weekend?"
    conversation_id: "oos_weather"
    history: []
    kb_articles: "${setup_data.kb.articles}"
  capture: call_oos_weather
rubrics:
- kind: schema_match
  target: call_oos_weather.body
  must_have_fields: ["reply", "action", "citations", "redactions", "abstained"]
- kind: literal_match
  target: call_oos_weather.body.action
  expected: "refuse"
- kind: literal_match
  target: call_oos_weather.body.abstained
  expected: true
