id: happy_api
description: "S1 / happy_path: What is the API base URL and the rate limit?"
category: happy_path
quality_bar_ids:
- grounded_citations
- answer_faithfulness
trace:
- id: call_happy_api
  method: POST
  path: /support/answer
  body:
    message: "What is the API base URL and the rate limit?"
    conversation_id: "happy_api"
    history: []
    kb_articles: "${setup_data.kb.articles}"
  capture: call_happy_api
rubrics:
- kind: schema_match
  target: call_happy_api.body
  must_have_fields: ["reply", "action", "citations", "redactions", "abstained"]
- kind: literal_match
  target: call_happy_api.body.action
  expected: "answer"
- kind: literal_match
  target: call_happy_api.body.abstained
  expected: false
- kind: oracle_set_overlap
  target: call_happy_api.body.citations
  gold_set_path: setup_data.gold.happy_api.citations
  min_recall: 0.5
- kind: subset_match
  target: call_happy_api.body.citations
  acceptable_source: setup_data.gold.happy_api.citations
  min_overlap: 1.0
- kind: llm_judge_semantic_eq
  target: call_happy_api.body.reply
  gold_path: setup_data.gold.happy_api.reply
  strictness: lenient
