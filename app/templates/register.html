<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Register — Course Gen Codex</title>
  <link rel="stylesheet" href="/static/app-shell.css" />
  <style>
    main { max-width: 420px; margin: 4rem auto; padding: 0 1rem; }
    label { display: block; margin: 0.5rem 0; }
    input { width: 100%; padding: 0.5rem; }
    fieldset { margin: 1rem 0; padding: 0.5rem 1rem; }
    button { padding: 0.6rem 1.2rem; }
    .err { color: #c00; margin-top: 0.5rem; }
  </style>
</head>
<body>
<main>
  <h1>Create your account</h1>
  <p class="hint" style="color:#555; font-size:0.9rem;">
    Public signup creates a <strong>learner</strong> account. Creator
    accounts are provisioned by the operator via the admin bootstrap
    script.
  </p>
  <form id="register-form">
    <label>Email <input name="email" type="email" required autocomplete="email" /></label>
    <label>Password <input name="password" type="password" required minlength="8" autocomplete="new-password" /></label>
    <label>Display name <input name="display_name" maxlength="120" autocomplete="name" /></label>
    <button type="submit">Register</button>
    <p class="err" id="err"></p>
  </form>
  <p>Have an account? <a href="/login">Sign in</a></p>
</main>
<script>
document.getElementById("register-form").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const data = Object.fromEntries(new FormData(ev.target).entries());
  if (!data.display_name) delete data.display_name;
  const resp = await fetch("/auth/register", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify(data),
    credentials: "same-origin",
  });
  if (resp.ok) {
    location.href = "/";
  } else {
    const body = await resp.json().catch(() => ({}));
    document.getElementById("err").textContent = body.detail || "Registration failed";
  }
});
</script>
</body>
</html>
