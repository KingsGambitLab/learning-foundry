<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — Scaler Labs</title>
  <link rel="icon" href="https://www.scaler.com/favicon.ico" />
  <link rel="stylesheet" href="/static/app-shell.css" />
  <style>
    body { background: #0f1419; color: #e8eef5; font: 15px/1.5 system-ui, sans-serif; }
    main { max-width: 380px; margin: 8vh auto; padding: 0 1.25rem; }
    .brand { display: flex; align-items: center; gap: 0.6rem; justify-content: center; margin-bottom: 2rem; }
    .brand img { width: 32px; height: 32px; border-radius: 6px; }
    .brand span { font-size: 1.25rem; font-weight: 650; letter-spacing: -0.01em; }
    h1 { font-size: 1.1rem; font-weight: 600; margin: 0 0 1.25rem; text-align: center; color: #aab6c4; }
    label { display: block; margin: 0.75rem 0 0.25rem; font-size: 0.85rem; color: #aab6c4; }
    input { width: 100%; padding: 0.6rem 0.7rem; border-radius: 7px; border: 1px solid #2a3441; background: #161c25; color: #e8eef5; box-sizing: border-box; }
    input:focus { outline: 2px solid #3b82f6; border-color: transparent; }
    button { width: 100%; margin-top: 1.25rem; padding: 0.65rem 1.2rem; border-radius: 7px; border: 0; background: #3b82f6; color: #fff; font-weight: 600; cursor: pointer; }
    button:hover { background: #2f6fe0; }
    .err { color: #f87171; margin-top: 0.75rem; min-height: 1.2em; font-size: 0.85rem; text-align: center; }
  </style>
</head>
<body>
<main>
  <div class="brand">
    <img src="https://www.scaler.com/favicon.ico" alt="Scaler" />
    <span>Scaler Labs</span>
  </div>
  <h1>Sign in to continue</h1>
  <form id="login-form">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required autocomplete="email" />
    <label for="password">Password</label>
    <input id="password" name="password" type="password" required minlength="8" autocomplete="current-password" />
    <button type="submit">Log in</button>
    <p class="err" id="err"></p>
  </form>
</main>
<script>
document.getElementById("login-form").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const data = Object.fromEntries(new FormData(ev.target).entries());
  const resp = await fetch("/auth/login", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify(data),
    credentials: "same-origin",
  });
  if (resp.ok) {
    const params = new URLSearchParams(location.search);
    location.href = params.get("next") || "/";
  } else {
    document.getElementById("err").textContent = "Invalid email or password.";
  }
});
</script>
</body>
</html>
