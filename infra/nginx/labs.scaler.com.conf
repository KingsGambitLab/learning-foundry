server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name labs.scaler.com;

    ssl_certificate     /etc/letsencrypt/live/labs.scaler.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/labs.scaler.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10M;

    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 75s;

    location ~ ^/editor/(?<eport>[0-9]+)/(?<rest>.*)$ {
        proxy_pass http://127.0.0.1:$eport/$rest$is_args$args;
        proxy_set_header Accept-Encoding "";
        sub_filter_once on;
        sub_filter '</head>' '<script src="/static/lab-tutor-editor-boot.js" data-editor-port="$eport"></script></head>';
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ~ ^/editor/(?<eport>[0-9]+)$ {
        return 302 /editor/$eport/;
    }

    location / {
        proxy_pass http://127.0.0.1:8040;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
